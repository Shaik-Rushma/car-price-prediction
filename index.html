<!DOCTYPE html>
<html>

<head>

<title>Car Price Prediction</title>

<style>

body{
    font-family:Arial;
    background:#f5f5f5;
}

.container{
    width:600px;
    margin:auto;
    margin-top:30px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0px 0px 10px gray;
}

h1{
    text-align:center;
}

input,select{
    width:100%;
    padding:10px;
    margin-top:10px;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
}

.result{
    margin-top:20px;
    text-align:center;
    font-size:22px;
    color:green;
}

</style>

</head>

<body>

<div class="container">

<h1>Car Price Prediction</h1>

<form action="/predict" method="POST">

<input
type="number"
step="0.1"
name="present_price"
placeholder="Present Price"
required>

<input
type="number"
name="kms"
placeholder="Driven Kilometers"
required>

<select name="fuel">
<option value="1">Petrol</option>
<option value="0">Diesel</option>
</select>

<select name="seller">
<option value="0">Dealer</option>
<option value="1">Individual</option>
</select>

<select name="transmission">
<option value="1">Manual</option>
<option value="0">Automatic</option>
</select>

<input
type="number"
name="owner"
placeholder="Owners"
required>

<input
type="number"
name="age"
placeholder="Car Age"
required>

<button type="submit">
Predict Price
</button>

</form>

<div class="result">
{{ prediction_text }}
</div>

</div>

</body>

</html>
